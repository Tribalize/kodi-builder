name: 🎬 Build Kodi APK

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Kodi version to build'
        required: true
        default: 'Omega'
        type: choice
        options:
          - Omega
          - Nexus
          - Matrix
          - master
      abi:
        description: 'Target device type'
        required: true
        default: 'arm64-v8a'
        type: choice
        options:
          - arm64-v8a (modern phones/boxes — recommended)
          - armeabi-v7a (older 32-bit devices)
          - x86_64 (emulators / Chromebooks)
      app_name:
        description: 'App display name (shown on launcher)'
        required: true
        default: 'Kodi'
      package_id:
        description: 'Android package ID (change to install alongside official Kodi)'
        required: true
        default: 'org.xbmc.kodi'
      apk_filename:
        description: 'APK file name (without .apk — leave blank to auto-generate)'
        required: false
        default: ''
      unknown_sources:
        description: 'Pre-enable Unknown sources (Settings > System > Add-ons)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      create_release:
        description: 'Publish as a GitHub Release when done?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      debug_mode:
        description: 'Enable verbose diagnostics and upload logs artifact'
        required: true
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build ${{ github.event.inputs.app_name }} (${{ github.event.inputs.branch }})
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout config repo
        uses: actions/checkout@v5

      - name: Workflow revision marker
        run: |
          echo "WORKFLOW_REV=2026-05-04-keystore-failsafe-v2"

      - name: Diagnostic preflight
        if: github.event.inputs.debug_mode == 'true'
        run: |
          set -euo pipefail
          echo "=== Runner / system ==="
          uname -a || true
          lsb_release -a || true
          echo "=== CPU / memory / disk ==="
          nproc || true
          free -h || true
          df -h || true
          echo "=== Tool versions ==="
          cmake --version || true
          java -version || true
          clang --version || true
          rustc --version || true
          cargo --version || true
          echo "=== Environment snapshot ==="
          env | sort | grep -E '^(ANDROID|JAVA|GITHUB|RUNNER|HOME|PATH)=' || true

      - name: Parse ABI selection
        id: abi
        run: |
          RAW="${{ github.event.inputs.abi }}"
          ABI="${RAW%% *}"
          echo "value=$ABI" >> $GITHUB_OUTPUT
          case "$ABI" in
            arm64-v8a)
              echo "triplet=aarch64-linux-android"   >> $GITHUB_OUTPUT
              echo "target_dir=aarch64-linux-android-24-release" >> $GITHUB_OUTPUT ;;
            armeabi-v7a)
              echo "triplet=arm-linux-androideabi"   >> $GITHUB_OUTPUT
              echo "target_dir=arm-linux-androideabi-24-release" >> $GITHUB_OUTPUT ;;
            x86_64)
              echo "triplet=x86_64-linux-android"    >> $GITHUB_OUTPUT
              echo "target_dir=x86_64-linux-android-24-release"  >> $GITHUB_OUTPUT ;;
          esac

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo DEBIAN_FRONTEND=noninteractive apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            git ninja-build make nasm python3 \
            curl unzip zip openjdk-17-jdk-headless \
            autoconf libtool pkg-config yasm ccache \
            libgl1-mesa-dev libgles2-mesa-dev \
            gperf default-jre imagemagick \
            2>&1 | tail -5
          # Install cmake 3.25+ required by Kodi depends
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y cmake --no-install-recommends 2>/dev/null || true
          cmake --version
          echo "✅ System packages installed"

      - name: Cache Android NDK
        uses: actions/cache@v5
        id: ndk-cache
        with:
          path: ~/android-ndk-r28c
          key: ndk-r28c-linux

      - name: Download Android NDK
        if: steps.ndk-cache.outputs.cache-hit != 'true'
        run: |
          echo "⬇️ Downloading NDK r28c..."
          curl -fsSL https://dl.google.com/android/repository/android-ndk-r28c-linux.zip \
            -o /tmp/ndk.zip
          unzip -q /tmp/ndk.zip -d ~/
          rm /tmp/ndk.zip
          echo "✅ NDK ready"

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Cache Kodi source
        uses: actions/cache@v5
        with:
          path: ~/kodi
          key: kodi-src-${{ github.event.inputs.branch }}-${{ hashFiles('.github/workflows/build-kodi.yml') }}

      - name: Clone / update Kodi source
        run: |
          set -euo pipefail
          if [ -d ~/kodi/.git ]; then
            echo "📦 Updating existing source..."
            git -C ~/kodi fetch origin
            git -C ~/kodi checkout ${{ github.event.inputs.branch }}
            # Ensure cached source is deterministic and not carrying prior run patches
            git -C ~/kodi reset --hard "origin/${{ github.event.inputs.branch }}"
            git -C ~/kodi clean -fd
          else
            echo "📦 Cloning Kodi ${{ github.event.inputs.branch }}..."
            git clone --depth=1 \
              -b ${{ github.event.inputs.branch }} \
              https://github.com/xbmc/xbmc ~/kodi
          fi
          echo "✅ Source ready ($(git -C ~/kodi rev-parse --short HEAD))"

      - name: Patch Android looper API for newer NDK
        run: |
          set -euo pipefail
          # NDK r28+ marks ALooper_pollAll unavailable; Kodi branches still using it
          # fail to compile. ALooper_pollOnce is the supported equivalent signature.
          mapfile -t LOOPER_FILES < <(grep -RIl "ALooper_pollAll(" ~/kodi/xbmc/platform/android || true)
          if [ ${#LOOPER_FILES[@]} -eq 0 ]; then
            echo "ℹ️ No ALooper_pollAll usage found under xbmc/platform/android"
            exit 0
          fi
          echo "Patching ALooper_pollAll -> ALooper_pollOnce in:"
          printf ' - %s\n' "${LOOPER_FILES[@]}"
          for f in "${LOOPER_FILES[@]}"; do
            sed -i 's/ALooper_pollAll(/ALooper_pollOnce(/g' "$f"
          done
          echo "Verification:"
          grep -RIn "ALooper_poll(All|Once)\(" ~/kodi/xbmc/platform/android | head -50 || true

      - name: Patch optical include mismatch for Android no-cdio builds
        run: |
          set -euo pipefail
          FILE=~/kodi/xbmc/filesystem/FileFactory.cpp
          if [ ! -f "$FILE" ]; then
            echo "ℹ️ FileFactory.cpp not found at expected path, skipping optical patch"
            exit 0
          fi
          # FileFactory includes CDDAFile.h unconditionally on some branches, but the
          # build disables optical/cdio for Android. Guard the include to match
          # ENABLE_OPTICAL=OFF and avoid pulling cdio headers.
          sed -i 's@#include "CDDAFile.h"@#if defined(HAS_OPTICAL_DRIVE)\n#include "CDDAFile.h"\n#endif@' "$FILE"
          echo "Verification of CDDA include guard in FileFactory.cpp:"
          grep -n 'CDDAFile.h\|HAS_OPTICAL_DRIVE' "$FILE" | head -20 || true

      - name: Patch CDDB include chain for no-optical Android builds
        run: |
          set -euo pipefail
          MUSIC_DB=~/kodi/xbmc/music/MusicDatabase.cpp
          CDDB_HDR=~/kodi/xbmc/network/cddb.h

          if [ -f "$MUSIC_DB" ]; then
            # Avoid pulling cddb.h (which pulls cdio) when optical is disabled.
            sed -i 's@#include "network/cddb.h"@#if defined(HAS_OPTICAL_DRIVE)\n#include "network/cddb.h"\n#endif@' "$MUSIC_DB"
            echo "Patched MusicDatabase.cpp include guard:"
            grep -n 'network/cddb.h\|HAS_OPTICAL_DRIVE' "$MUSIC_DB" | head -20 || true
          fi

          if [ -f "$CDDB_HDR" ]; then
            # Defensive: if another TU still includes cddb.h with optical off, forward declare
            # CCdInfo instead of hard including cdioSupport.h.
            sed -i 's@#include "storage/cdioSupport.h"@#if defined(HAS_OPTICAL_DRIVE)\n#include "storage/cdioSupport.h"\n#else\nnamespace MEDIA_DETECT { class CCdInfo; }\n#endif@' "$CDDB_HDR"
            echo "Patched cddb.h include guard:"
            grep -n 'cdioSupport.h\|MEDIA_DETECT\|HAS_OPTICAL_DRIVE' "$CDDB_HDR" | head -30 || true
          fi

      - name: Patch Android platform to copy custom config from assets on first launch
        run: |
          set -euo pipefail
          PLATFORM_CPP=~/kodi/xbmc/platform/android/PlatformAndroid.cpp
          if [ ! -f "$PLATFORM_CPP" ]; then
            echo "⚠️ PlatformAndroid.cpp not found — skipping"
            exit 0
          fi

          # Add #include for CUtil (needed for CopyUserDataIfNeeded)
          if ! grep -q 'Util.h' "$PLATFORM_CPP"; then
            sed -i '/#include "ServiceBroker.h"/a #include "Util.h"' "$PLATFORM_CPP"
          fi

          # Inject CopyUserDataIfNeeded calls after the SSL_CERT_FILE setenv line.
          # This mirrors what iOS does in PlatformDarwinEmbedded.cpp — copying
          # bundled config files from APK assets (special://xbmc/userdata/) to the
          # writable profile (special://masterprofile/) on first launch only.
          MARKER='setenv("SSL_CERT_FILE"'
          if grep -q "$MARKER" "$PLATFORM_CPP" && ! grep -q "CopyUserDataIfNeeded" "$PLATFORM_CPP"; then
            sed -i "/$MARKER/a\\
          \\
            \/\/ Copy bundled userdata config files to profile on first launch\\
            CUtil::CopyUserDataIfNeeded(\"special://masterprofile/\", \"advancedsettings.xml\");\\
            CUtil::CopyUserDataIfNeeded(\"special://masterprofile/\", \"sources.xml\");\\
            CUtil::CopyUserDataIfNeeded(\"special://masterprofile/\", \"guisettings.xml\");" "$PLATFORM_CPP"
            echo "✅ Patched PlatformAndroid.cpp with CopyUserDataIfNeeded calls"
          else
            echo "ℹ️ PlatformAndroid.cpp already patched or marker not found"
          fi
          grep -n "CopyUserDataIfNeeded\|Util.h" "$PLATFORM_CPP" || true

      - name: Apply custom app name
        if: github.event.inputs.app_name != 'Kodi'
        run: |
          APP="${{ github.event.inputs.app_name }}"
          echo "🎨 Renaming app to: $APP"
          find ~/kodi/tools/android/packaging -type f -name "*.xml" -o -name "*.gradle" | \
            xargs sed -i "s|>Kodi<|>$APP<|g; s|\"Kodi\"|\"$APP\"|g" 2>/dev/null || true

      - name: Apply custom package ID
        if: github.event.inputs.package_id != 'org.xbmc.kodi'
        run: |
          PKG="${{ github.event.inputs.package_id }}"
          echo "📦 Setting package ID: $PKG"
          find ~/kodi/tools/android/packaging -type f | \
            xargs sed -i "s|org\.xbmc\.kodi|$PKG|g" 2>/dev/null || true

      - name: Apply custom icon
        run: |
          ICON="${{ github.workspace }}/kodi-config/icon.png"
          if [ -f "$ICON" ]; then
            echo "🖼️ Applying custom icon to all branding images..."

            # --- 1. Android launcher icons (res/drawable-*/) ---
            MEDIA=~/kodi/tools/android/packaging/media
            declare -A LAUNCHER_SIZES=(
              [drawable-ldpi]=36 [drawable-mdpi]=48 [drawable-hdpi]=72
              [drawable-xhdpi]=96 [drawable-xxhdpi]=144 [drawable-xxxhdpi]=192
            )
            for d in "${!LAUNCHER_SIZES[@]}"; do
              if [ -d "$MEDIA/$d" ]; then
                convert "$ICON" -resize "${LAUNCHER_SIZES[$d]}x${LAUNCHER_SIZES[$d]}" "$MEDIA/$d/ic_launcher.png"
              fi
            done
            echo "  ✅ ic_launcher.png — all density buckets"

            # --- 2. Android TV banner (drawable-xhdpi/banner.png) [320x180] ---
            if [ -d "$MEDIA/drawable-xhdpi" ]; then
              convert "$ICON" -resize 320x180 -background none -gravity center -extent 320x180 "$MEDIA/drawable-xhdpi/banner.png"
              echo "  ✅ banner.png — Android TV banner"
            fi

            # --- 3. media/ icon files (bundled in APK assets) ---
            for size in 16 32 48 80 120 256; do
              convert "$ICON" -resize "${size}x${size}" ~/kodi/media/icon${size}x${size}.png
            done
            echo "  ✅ icon16-256.png — media icons"

            # --- 4. media/banner.png [320x180] ---
            convert "$ICON" -resize 320x180 -background none -gravity center -extent 320x180 ~/kodi/media/banner.png
            echo "  ✅ banner.png — media banner"

            # --- 5. media/vendor_icon.png [128x128] ---
            convert "$ICON" -resize 128x128 ~/kodi/media/vendor_icon.png
            echo "  ✅ vendor_icon.png"

            # --- 6. media/vendor_logo.png [465x128] ---
            # This is a wide logo. Center the icon on a transparent 465x128 canvas.
            convert "$ICON" -resize 128x128 -background none -gravity center -extent 465x128 ~/kodi/media/vendor_logo.png
            echo "  ✅ vendor_logo.png"

            echo "✅ Custom icon applied to all branding images"
          else
            echo "ℹ️ No custom icon found (kodi-config/icon.png) — using default"
          fi

      - name: Apply custom splash screen
        run: |
          SPLASH="${{ github.workspace }}/kodi-config/splash.png"
          if [ -f "$SPLASH" ]; then
            echo "🖼️ Applying custom splash..."
            # Kodi has two splash images:
            # 1. media/splash.jpg — the in-app splash shown by Kodi itself (bundled in assets) [1920x1080]
            # 2. media/applaunch_screen.png — the Android launch drawable (shown instantly by OS) [1920x1080]
            # Both live in the source media/ dir and get packaged via different paths.
            # Resize to 1920x1080 and convert to proper formats.
            convert "$SPLASH" -resize 1920x1080 -background black -gravity center -extent 1920x1080 ~/kodi/media/splash.jpg
            convert "$SPLASH" -resize 1920x1080 -background black -gravity center -extent 1920x1080 ~/kodi/media/applaunch_screen.png
            echo "✅ Splash applied (both in-app and Android launch screen)"
          else
            echo "ℹ️ No custom splash found (kodi-config/splash.png) — using default"
          fi

      - name: Stage pre-installed addons
        run: |
          ADDONS_FILE="${{ github.workspace }}/kodi-config/addons.txt"
          if [ ! -f "$ADDONS_FILE" ]; then
            echo "ℹ️ No addons.txt found — skipping"
            exit 0
          fi
          COUNT=0
          # Use a dedicated staging directory so we only inject custom addons
          # into the APK, not the entire Kodi built-in addons tree (38MB+).
          ADDON_STAGE=~/staged-addons
          mkdir -p "$ADDON_STAGE"
          while IFS= read -r url || [ -n "$url" ]; do
            url="$(echo "$url" | xargs)"
            [ -z "$url" ] || [[ "$url" == \#* ]] && continue
            fname=$(basename "$url")
            echo "  ⬇️ $fname from $url"
            # Some hosts (e.g. GitHub Pages) reject bare curl requests.
            # Try with User-Agent header and retry on failure.
            if curl -L --retry 3 --retry-delay 5 \
                 -H "User-Agent: Mozilla/5.0 (Linux; Android) Kodi" \
                 -o "/tmp/$fname" "$url" 2>&1; then
              if [ -f "/tmp/$fname" ] && file "/tmp/$fname" | grep -q "Zip"; then
                unzip -o -q "/tmp/$fname" -d "$ADDON_STAGE/" 2>/dev/null || true
                echo "  ✅ Extracted $(basename /tmp/$fname)"
              else
                echo "  ⚠️ Downloaded file is not a valid zip: /tmp/$fname"
                file "/tmp/$fname" 2>/dev/null || true
              fi
              rm -f "/tmp/$fname"
              COUNT=$((COUNT+1))
            else
              echo "  ❌ Failed to download: $url"
            fi
          done < "$ADDONS_FILE"
          echo "Staged addon directories:"
          ls -la "$ADDON_STAGE/" 2>/dev/null || echo "  (empty)"
          echo "✅ $COUNT addon(s) staged in $ADDON_STAGE"

      - name: Bake in advancedsettings.xml
        run: |
          SRC="${{ github.workspace }}/kodi-config/advancedsettings.xml"
          if [ -f "$SRC" ]; then
            # Kodi reads advancedsettings.xml from userdata/ at runtime, not system/.
            # The cmake install_data includes userdata/* (common.txt line 13),
            # so files here get bundled into the APK assets automatically.
            mkdir -p ~/kodi/userdata
            cp "$SRC" ~/kodi/userdata/advancedsettings.xml
            echo "✅ advancedsettings.xml baked into userdata/"
          fi

      - name: Bake in sources.xml
        run: |
          SRC="${{ github.workspace }}/kodi-config/sources.xml"
          if [ -f "$SRC" ]; then
            mkdir -p ~/kodi/userdata
            cp "$SRC" ~/kodi/userdata/sources.xml
            echo "✅ sources.xml baked into userdata/"
          fi

      - name: Bake in guisettings.xml (unknown sources + any user overrides)
        run: |
          UNKNOWN="${{ github.event.inputs.unknown_sources }}"

          # Kodi generates guisettings.xml from scratch on first launch using the
          # default values defined in system/settings/settings.xml. It does NOT
          # read a pre-shipped guisettings.xml from assets. So to pre-enable
          # unknown sources, we patch the default value in the settings definition.
          if [ "$UNKNOWN" = "true" ]; then
            SETTINGS_XML=~/kodi/system/settings/settings.xml
            if [ -f "$SETTINGS_XML" ]; then
              # Change the default for addons.unknownsources from false to true.
              # The setting block looks like:
              #   <setting id="addons.unknownsources" type="boolean" ...>
              #     ...
              #     <default>false</default>
              #     ...
              #   </setting>
              # We use a targeted sed that only changes <default> within the
              # unknownsources setting block.
              sed -i '/<setting id="addons.unknownsources"/,/<\/setting>/ s|<default>false</default>|<default>true</default>|' "$SETTINGS_XML"
              # Also change addons.updatemode from 0 (OFFICIAL_ONLY) to 1 (ANY_REPOSITORY)
              # so that addons from third-party repos can receive updates.
              sed -i '/<setting id="addons.updatemode"/,/<\/setting>/ s|<default>0</default>|<default>1</default>|' "$SETTINGS_XML"
              echo "Verification:"
              grep -A 5 'addons.unknownsources\|addons.updatemode' "$SETTINGS_XML" | head -16
              echo "✅ Unknown sources: ENABLED + Update mode: ANY_REPOSITORY"
            else
              echo "⚠️ settings.xml not found at $SETTINGS_XML"
            fi
          else
            echo "✅ Unknown sources: disabled (default)"
          fi

          # If the user has supplied a custom guisettings.xml, stage it for
          # CopyUserDataIfNeeded — but note Kodi only auto-copies specific files
          # (RssFeeds.xml, favourites.xml, Lircmap.xml), so this is best-effort.
          USERDATA_SRC="${{ github.workspace }}/kodi-config/guisettings.xml"
          if [ -f "$USERDATA_SRC" ]; then
            mkdir -p ~/kodi/userdata
            cp "$USERDATA_SRC" ~/kodi/userdata/guisettings.xml
            echo "📋 Custom guisettings.xml staged in userdata/ (best-effort)"
          fi

      - name: Cache source tarballs
        uses: actions/cache@v5
        with:
          path: ~/kodi-tarballs
          key: kodi-tarballs-${{ github.event.inputs.branch }}-v1

      - name: Cache Kodi depends
        id: depends-cache
        uses: actions/cache@v5
        with:
          path: ~/kodi-depends
          key: kodi-depends-${{ github.event.inputs.branch }}-${{ steps.abi.outputs.value }}-v20

      - name: Configure and build Kodi depends
        run: |
          set -euo pipefail
          DEPENDS_DIR=$HOME/kodi/tools/depends
          DEPENDS_PREFIX=$HOME/kodi-depends
          TARBALLS=$HOME/kodi-tarballs
          NDK=$HOME/android-ndk-r28c
          HOST=${{ steps.abi.outputs.triplet }}
          SYS_CMAKE=$(which cmake)
          NATIVE_BIN="$DEPENDS_PREFIX/x86_64-linux-gnu-native/bin"

          mkdir -p "$TARBALLS"

          TARGET_DIR="${{ steps.abi.outputs.target_dir }}"

          # Cache hit is valid if the target prefix has libs (works for all ABIs)
          if [ "${{ steps.depends-cache.outputs.cache-hit }}" = "true" ] && \
             [ -d "$DEPENDS_PREFIX/$TARGET_DIR/lib" ] && \
             [ "$(ls -A $DEPENDS_PREFIX/$TARGET_DIR/lib 2>/dev/null)" ]; then
            echo "✅ Valid cached depends — skipping rebuild"
          else
            echo "📦 Bootstrapping depends..."
            cd "$DEPENDS_DIR"
            ./bootstrap

            # Patch Makefile.include.in so cmakebuildsys uses system cmake path
            sed -i "s|CMAKE=@prefix@/@tool_dir@/bin/cmake|CMAKE=$SYS_CMAKE|g" Makefile.include.in
            echo "✅ Patched Makefile.include.in: CMAKE=$SYS_CMAKE"

            # The parent native/Makefile has cmake as a dependency at line ~104.
            # It calls 'make -C native/cmake' which builds cmake from source using clang,
            # which fails with "unsupported option -print-multi-os-directory".
            # Fix: remove cmake from the native Makefile dependency list and
            # instead pre-populate the cmake binary directly in the prefix.

            # 1. Remove 'cmake' from the native Makefile dependency list.
            # Use grep+awk to safely rewrite the file without complex regex.
            grep -v '^	cmake$' native/Makefile | \
              sed 's/ cmake / /g' | \
              sed 's/ cmake$//' | \
              sed 's/cmake \\//' > native/Makefile.tmp
            mv native/Makefile.tmp native/Makefile
            echo "Removed cmake from native/Makefile — cmake refs remaining:"
            grep -n "cmake" native/Makefile | head -5 || echo "  none"

            # 2. Pre-install system cmake into the expected output location
            mkdir -p "$NATIVE_BIN"
            cp -f "$SYS_CMAKE" "$NATIVE_BIN/cmake"
            chmod +x "$NATIVE_BIN/cmake"
            mkdir -p "$DEPENDS_DIR/native/cmake"
            touch "$DEPENDS_DIR/native/cmake/.installed-x86_64-linux-native"
            echo "Pre-installed system cmake at $NATIVE_BIN/cmake"

            echo "⚙️ Configuring depends..."
            ./configure \
              --host="$HOST" \
              --with-sdk-path="$ANDROID_HOME" \
              --with-ndk-path="$NDK" \
              --with-ndk-api=24 \
              --with-tarballs="$TARBALLS" \
              --prefix="$DEPENDS_PREFIX" \
              --disable-gplv3 \
              --enable-debug=no

            # Remove packages that are not needed for Android or fail to build with
            # Android clang on GitHub-hosted runners. All confirmed non-issues for
            # the Android APK — Kodi Android has its own SMB (libsmb2), no optical
            # disc support, no system dbus, no CEC, no Wayland/X11, etc.
            #
            # Package list and reasons:
            #  samba / samba-gplv3   — IDL type errors with NDK clang; libsmb2 used instead
            #  libcdio / libcdio-gplv3 — AM_LANGINFO_CODESET autoconf error; CD-ROM, N/A on Android
            #  libcec                — CEC (HDMI) only meaningful on Linux desktop / embedded
            #  lirc                  — Linux infrared; no Android support
            #  libdvdcss             — DVD decryption; optical discs N/A on Android
            #  libdvdread / libdvdnav — DVD navigation; optical discs N/A on Android
            #  dbus                  — Linux system bus; not used on Android
            #  libuuid               — provided by Android NDK bionic libc directly
            #  alsa-lib              — ALSA audio; Android uses AudioTrack/AAudio
            #  libdrm                — DRM/KMS; Android uses SurfaceFlinger
            #  libxkbcommon          — X11 keyboard handling; N/A on Android
            #  libinput              — Linux input subsystem; N/A on Android
            #  libudev               — udev device manager; N/A on Android
            #  libevdev              — evdev input; N/A on Android
            #  mtdev                 — multitouch device; N/A on Android
            #  wayland               — Wayland compositor; N/A on Android
            #  waylandpp             — Wayland C++ bindings; N/A on Android
            #  wayland-protocols     — Wayland protocols; N/A on Android
            SKIP_PKGS="samba-gplv3 samba libcdio-gplv3 libcdio libcec lirc"
            SKIP_PKGS="$SKIP_PKGS libdvdcss libdvdread libdvdnav"
            SKIP_PKGS="$SKIP_PKGS dbus libuuid alsa-lib libdrm"
            SKIP_PKGS="$SKIP_PKGS libxkbcommon libinput libudev libevdev mtdev"
            SKIP_PKGS="$SKIP_PKGS wayland waylandpp wayland-protocols"
            SKIP_PKGS="$SKIP_PKGS gnutls"  # Uses tzalloc/mktime_z not in Android bionic; Kodi uses OpenSSL
            SKIP_PKGS="$SKIP_PKGS libmicrohttpd"  # Requires gnutls; Kodi web server not needed on Android
            for pkg in $SKIP_PKGS; do
              # Remove make rule block for this package
              sed -i "/^${pkg}:/,/^[^	]/{/^${pkg}:/d;/^	/d}" target/Makefile
              # Remove from DEPENDS+= lines (handles: "pkg ", " pkg", "pkg$", "+=pkg")
              sed -i "s/+=${pkg}$/+=/g" target/Makefile
              sed -i "s/+=${pkg} /+=/g" target/Makefile
              sed -i "s/ ${pkg} / /g; s/ ${pkg}$//; s/^${pkg} //" target/Makefile
            done
            # Clean up empty DEPENDS+= lines and double spaces
            sed -i '/^[[:space:]]*DEPENDS+=[[:space:]]*$/d' target/Makefile
            sed -i 's/  */ /g' target/Makefile
            echo "Removed non-Android packages. Remaining package refs check:"
            grep -n "samba\|libcdio\|libcec\|lirc\|libdvd\|wayland" target/Makefile | head -10 || echo "  none"

            # Place cmake symlink in the native bin for cmakebuildsys
            mkdir -p "$NATIVE_BIN"
            ln -sf "$SYS_CMAKE" "$NATIVE_BIN/cmake"

            # Redirect Rust env so runner's pre-installed Rust doesn't conflict
            export RUSTUP_HOME="$DEPENDS_PREFIX/x86_64-linux-gnu-native/.rustup"
            export CARGO_HOME="$DEPENDS_PREFIX/x86_64-linux-gnu-native/.cargo"

            echo "🔨 Building depends (60-90 min first time)..."
            set +e
            make -j$(nproc) 2>&1 | tee ~/depends-build.log
            BUILD_EXIT=${PIPESTATUS[0]}
            set -e

            if [ $BUILD_EXIT -ne 0 ]; then
              echo "❌ Depends build failed (exit $BUILD_EXIT)"
              tail -100 ~/depends-build.log
              exit $BUILD_EXIT
            fi
            echo "✅ Depends built"
          fi

          # Always ensure cmake symlink is in place (survives cache restore)
          mkdir -p "$NATIVE_BIN"
          ln -sf "$SYS_CMAKE" "$NATIVE_BIN/cmake"
          echo "cmake: $($NATIVE_BIN/cmake --version | head -1)"

          # Makefile.include is generated by ./configure inside tools/depends and is
          # NOT part of the cached ~/kodi-depends prefix. The source tree is freshly
          # cloned/reset every run, so Makefile.include must be regenerated even on
          # cache hits. Without it, cmakebuildsys has no CMAKE_SOURCE_DIR, no
          # CMAKE_TOOLCHAIN_FILE, and no PREFIX — causing the cmake invocation to
          # silently drop the Kodi source path and the cross-compilation toolchain.
          if [ ! -f "$DEPENDS_DIR/Makefile.include" ]; then
            echo "📦 Regenerating Makefile.include (not present after cache restore)..."
            cd "$DEPENDS_DIR"
            ./bootstrap
            # Patch Makefile.include.in so cmake path points to system cmake
            sed -i "s|CMAKE=@prefix@/@tool_dir@/bin/cmake|CMAKE=$SYS_CMAKE|g" Makefile.include.in
            ./configure \
              --host="$HOST" \
              --with-sdk-path="$ANDROID_HOME" \
              --with-ndk-path="$NDK" \
              --with-ndk-api=24 \
              --with-tarballs="$TARBALLS" \
              --prefix="$DEPENDS_PREFIX" \
              --disable-gplv3 \
              --enable-debug=no
            echo "✅ Makefile.include regenerated"
          fi

      - name: Generate CMake build files via cmakebuildsys
        run: |
          set -euo pipefail
          # cmakebuildsys uses the depends toolchain + cmake (symlinked to system cmake)
          BUILD_DIR=$HOME/kodi-build
          DEPENDS_PREFIX=$HOME/kodi-depends
          NATIVE_BIN="$DEPENDS_PREFIX/x86_64-linux-gnu-native/bin"
          SYS_CMAKE=$(which cmake)
          # Avoid stale cache/config interactions from prior attempts in same runner state
          rm -rf "$BUILD_DIR"
          mkdir -p "$BUILD_DIR"
          # Ensure PATH includes native bin so cmakebuildsys finds our cmake symlink
          export PATH="$NATIVE_BIN:$PATH"
          echo "cmake in PATH: $(which cmake) — $(cmake --version | head -1)"
          cd $HOME/kodi

          # Nuclear option: replace ALL core_require_dep calls with core_optional_dep
          # across the entire source tree. This prevents any missing-library hard errors.
          # We then use ENABLE_X=OFF for things we explicitly don't want.
          # NOTE: core_optional_dep respects ENABLE flags; core_require_dep ignores them.
          echo "Patching all core_require_dep → core_optional_dep in source tree..."
          grep -rl "core_require_dep" . --include="*.cmake" --include="CMakeLists.txt" 2>/dev/null | \
            xargs -r sed -i 's/core_require_dep(/core_optional_dep(/g'
          echo "Patch complete. Remaining core_require_dep calls:"
          grep -r "core_require_dep" . --include="*.cmake" --include="CMakeLists.txt" 2>/dev/null | head -5 || echo "  none"

          # FindLibZip currently hard-requires GnuTLS when it needs to build internal
          # libzip. In this workflow we intentionally skip gnutls in depends, so patch
          # libzip discovery to use OpenSSL-backed libzip instead of failing configure.
          if [ -f cmake/modules/FindLibZip.cmake ]; then
            echo "Patching FindLibZip.cmake to avoid hard GnuTLS dependency..."
            sed -i 's/find_package(GnuTLS MODULE REQUIRED)/find_package(GnuTLS MODULE QUIET)/' cmake/modules/FindLibZip.cmake
            sed -i '/set(CMAKE_ARGS -DBUILD_DOC=OFF/a\                 -DENABLE_GNUTLS=OFF\n                 -DENABLE_OPENSSL=ON\n                 -DENABLE_MBEDTLS=OFF\n                 -DENABLE_WINDOWS_CRYPTO=OFF\n                 -DENABLE_COMMONCRYPTO=OFF' cmake/modules/FindLibZip.cmake
            echo "Patched lines:"
            grep -n "GnuTLS\|ENABLE_GNUTLS\|ENABLE_OPENSSL\|ENABLE_MBEDTLS" cmake/modules/FindLibZip.cmake || true
          fi

          # ENABLE=OFF: explicitly disable features we skipped in depends.
          # ENABLE=AUTO (default) would just skip gracefully if not found.
          # OFF is correct here — we don't want cmake to even try to use them.
          KODI_CMAKE_ARGS="-DCMAKE_BUILD_TYPE=Release"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_OPTICAL=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_MICROHTTPD=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_UPNP=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_DBUS=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_ALSA=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_UDEV=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_LIRC=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_CEC=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_PULSEAUDIO=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_PIPEWIRE=OFF"
          KODI_CMAKE_ARGS="$KODI_CMAKE_ARGS -DENABLE_SMBCLIENT=OFF"
          set +e
          cd $HOME/kodi/tools/depends
          # NOTE: Do NOT override CMAKE= here. The Makefile.include generated by
          # ./configure defines CMAKE with the toolchain file and install prefix:
          #   CMAKE=/path/to/cmake -DCMAKE_TOOLCHAIN_FILE=... -DCMAKE_INSTALL_PREFIX=...
          # Overriding it with just the bare cmake path strips the cross-compilation
          # toolchain, causing the build to target the host instead of Android.
          # The earlier patch to Makefile.include.in already replaced the cmake
          # binary path with the system cmake.
          #
          # CMAKE_SOURCE_DIR is passed as a safety net — Makefile.include sets it
          # from abs_top_srcdir, but if the include ever fails silently (-include),
          # the cmake command would be missing the Kodi source path entirely.
          make -C target/cmakebuildsys \
            BUILD_DIR="$BUILD_DIR" \
            CMAKE_SOURCE_DIR="$HOME/kodi" \
            CMAKE_EXTRA_ARGUMENTS="$KODI_CMAKE_ARGS" \
            2>&1 | tee ~/cmakebuildsys.log
          CMAKEGEN_EXIT=${PIPESTATUS[0]}
          set -e
          if [ $CMAKEGEN_EXIT -ne 0 ]; then
            echo "❌ cmakebuildsys failed (exit $CMAKEGEN_EXIT)"
            echo "--- Full cmakebuildsys log ---"
            cat ~/cmakebuildsys.log
            exit $CMAKEGEN_EXIT
          fi
          # Verify a Makefile was actually generated
          if [ ! -f "$BUILD_DIR/Makefile" ]; then
            echo "❌ cmakebuildsys did not produce a Makefile"
            echo "--- Full cmakebuildsys log ---"
            cat ~/cmakebuildsys.log
            exit 1
          fi
          echo "✅ CMake build files generated in $BUILD_DIR"
          ls "$BUILD_DIR"

      - name: Create signing keystore
        run: |
          set -euo pipefail
          mkdir -p ~/.android

          # Keystore used by our final apksigner step
          keytool -genkey -v \
            -keystore ~/.android/kodi.keystore \
            -alias kodi \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Kodi Build, OU=CI, O=GitHub Actions, L=Cloud, ST=Cloud, C=US" \
            > /dev/null 2>&1

          # Kodi/Gradle packaging validateSigningRelease expects this exact file path
          # and debug alias in some branches/configs.
          keytool -genkey -v \
            -keystore ~/.android/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=Android Debug,O=Android,C=US" \
            > /dev/null 2>&1

          echo "✅ Signing keystores created:"
          ls -la ~/.android

      - name: Build Kodi
        run: |
          set -euo pipefail
          BUILD_DIR=$HOME/kodi-build
          echo "🏗️ Building Kodi (this takes a while)..."
          set +e
          # Stream output live so long compiles do not look idle in Actions logs.
          make -C "$BUILD_DIR" -j$(nproc) 2>&1 | tee ~/kodi-build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          set -e
          if [ $BUILD_EXIT -ne 0 ]; then
            echo "❌ Build failed (exit $BUILD_EXIT)"
            tail -100 ~/kodi-build.log
            exit $BUILD_EXIT
          fi
          echo "✅ Kodi compiled"

      - name: Inject custom config into APK assets and package
        run: |
          set -euo pipefail
          BUILD_DIR=$HOME/kodi-build
          KODI_SRC=$HOME/kodi
          DEPENDS_PREFIX=$HOME/kodi-depends
          TARGET_DIR="${{ steps.abi.outputs.target_dir }}"
          PREFIX="$DEPENDS_PREFIX/$TARGET_DIR"
          PACKAGING_DIR="$BUILD_DIR/tools/android/packaging"

          echo "📦 Packaging APK..."

          # Fail-safe: ensure Gradle's expected keystore exists at package time.
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            if [ -f ~/.android/kodi.keystore ]; then
              cp -f ~/.android/kodi.keystore ~/.android/debug.keystore
            else
              keytool -genkey -v \
                -keystore ~/.android/debug.keystore \
                -alias androiddebugkey \
                -keyalg RSA -keysize 2048 \
                -validity 10000 \
                -storepass android \
                -keypass android \
                -dname "CN=Android Debug,O=Android,C=US" \
                > /dev/null 2>&1
            fi
          fi

          ADV_SRC="${{ github.workspace }}/kodi-config/advancedsettings.xml"
          SRC_SRC="${{ github.workspace }}/kodi-config/sources.xml"
          GUI_SRC="${{ github.workspace }}/kodi-config/guisettings.xml"
          ADDONS_STAGED="$HOME/staged-addons"

          # --- PHASE 1: Inject config into PREFIX share BEFORE packaging ---
          # The 'make apk' shared target copies $(PREFIX)/share/kodi/* into assets.
          SHARE_DIR="$PREFIX/share/kodi"
          if [ -d "$SHARE_DIR" ]; then
            mkdir -p "$SHARE_DIR/userdata"
            [ -f "$ADV_SRC" ] && cp "$ADV_SRC" "$SHARE_DIR/userdata/advancedsettings.xml" && echo "✅ Injected advancedsettings.xml into PREFIX share"
            [ -f "$SRC_SRC" ] && cp "$SRC_SRC" "$SHARE_DIR/userdata/sources.xml" && echo "✅ Injected sources.xml into PREFIX share"
            [ -f "$GUI_SRC" ] && cp "$GUI_SRC" "$SHARE_DIR/userdata/guisettings.xml" && echo "✅ Injected custom guisettings.xml into PREFIX share"
            if [ -d "$ADDONS_STAGED" ] && [ "$(ls -A "$ADDONS_STAGED" 2>/dev/null)" ]; then
              mkdir -p "$SHARE_DIR/addons"
              cp -a "$ADDONS_STAGED/." "$SHARE_DIR/addons/"
              echo "✅ Injected staged addons into PREFIX share"
            fi
            echo "PREFIX share userdata contents:"
            ls -la "$SHARE_DIR/userdata/" || true
          else
            echo "⚠️ PREFIX share dir not found at $SHARE_DIR"
          fi

          # --- PHASE 2: Run make apk (bundle + shared + libs + python + java + gradle) ---
          cd "$KODI_SRC"
          make -C "$BUILD_DIR" apk 2>&1 | tee ~/apk-package.log

          # --- PHASE 3: Force-inject into packaging assets and RE-RUN gradle ---
          # make apk already ran gradle, but the assets may not have included our
          # custom config if the cmake/bundle pipeline didn't pick them up.
          # We inject directly into xbmc/assets/ and re-run gradle to rebuild
          # the APK with the custom files included.
          ASSETS_DIR="$PACKAGING_DIR/xbmc/assets"
          NEEDS_REPACK=false

          if [ -d "$ASSETS_DIR" ]; then
            mkdir -p "$ASSETS_DIR/userdata"

            if [ -f "$ADV_SRC" ]; then
              cp -f "$ADV_SRC" "$ASSETS_DIR/userdata/advancedsettings.xml"
              echo "✅ Injected advancedsettings.xml into packaging assets"
              NEEDS_REPACK=true
            fi
            if [ -f "$SRC_SRC" ]; then
              cp -f "$SRC_SRC" "$ASSETS_DIR/userdata/sources.xml"
              echo "✅ Injected sources.xml into packaging assets"
              NEEDS_REPACK=true
            fi
            if [ -f "$GUI_SRC" ]; then
              cp -f "$GUI_SRC" "$ASSETS_DIR/userdata/guisettings.xml"
              echo "✅ Injected custom guisettings.xml into packaging assets"
              NEEDS_REPACK=true
            fi
            if [ -d "$ADDONS_STAGED" ] && [ "$(ls -A "$ADDONS_STAGED" 2>/dev/null)" ]; then
              mkdir -p "$ASSETS_DIR/addons"
              cp -a "$ADDONS_STAGED/." "$ASSETS_DIR/addons/"
              echo "✅ Injected staged addons into packaging assets"
              NEEDS_REPACK=true
            fi

            echo "--- Final packaging assets verification ---"
            echo "userdata/:"
            ls -la "$ASSETS_DIR/userdata/" 2>/dev/null || echo "  (empty)"
            echo "addons/ (first 10):"
            ls "$ASSETS_DIR/addons/" 2>/dev/null | head -10 || echo "  (none)"

            # --- Remove non-Android assets to trim APK size ---
            # These files get bundled by the generic install_data globs but are
            # not used on Android.
            TRIMMED=0

            # Desktop OpenGL shaders (Android uses GLES only)
            if [ -d "$ASSETS_DIR/system/shaders/GL" ]; then
              rm -rf "$ASSETS_DIR/system/shaders/GL"
              echo "🗑️ Removed system/shaders/GL/ (desktop OpenGL — Android uses GLES)"
              TRIMMED=1
            fi

            # Apple-specific keymaps
            for f in customcontroller.AppleRemote.xml customcontroller.SiriRemote.xml; do
              if [ -f "$ASSETS_DIR/system/keymaps/$f" ]; then
                rm -f "$ASSETS_DIR/system/keymaps/$f"
                echo "🗑️ Removed system/keymaps/$f"
                TRIMMED=1
              fi
            done

            # Linux-specific keymap device profiles (OSMC, WeTek, Nyxboard)
            for d in nyxboard osmc osmcv3 wetek-play; do
              if [ -d "$ASSETS_DIR/system/keymaps/$d" ]; then
                rm -rf "$ASSETS_DIR/system/keymaps/$d"
                echo "🗑️ Removed system/keymaps/$d/"
                TRIMMED=1
              fi
            done

            if [ "$TRIMMED" = "1" ]; then
              NEEDS_REPACK=true
            fi

            # Re-run gradle to rebuild the APK with injected files
            if [ "$NEEDS_REPACK" = "true" ]; then
              echo "🔄 Re-running gradle to include injected custom config..."
              cd "$PACKAGING_DIR"
              ANDROID_HOME="$ANDROID_SDK_ROOT" ./gradlew assembleRelease 2>&1 | tee -a ~/apk-package.log || \
              ANDROID_HOME="$ANDROID_SDK_ROOT" ./gradlew assembleDebug 2>&1 | tee -a ~/apk-package.log || true
            fi
          else
            echo "⚠️ Packaging assets dir not found at $ASSETS_DIR"
          fi

          echo "--- APK search after packaging ---"
          find ~ -name "*.apk" 2>/dev/null | grep -v ".gradle" | grep -v "/tmp/" | sort || echo "No APK found yet"
          echo "✅ Packaging step complete"

      - name: Locate built APK
        id: locate
        run: |
          echo "🔍 Locating final APK..."
          APK=$(find ~ -name "*.apk" 2>/dev/null \
            | grep -v ".gradle" \
            | grep -v "/tmp/" \
            | grep -v "aligned" \
            | head -1)
          if [ -z "$APK" ]; then
            echo "❌ No APK found. Logs:"
            tail -80 ~/apk-package.log 2>/dev/null || true
            echo "--- Build dir contents ---"
            ls -la $HOME/kodi-build/ 2>/dev/null || true
            echo "--- Packaging dir contents ---"
            ls -la $HOME/kodi/tools/android/packaging/ 2>/dev/null || true
            exit 1
          fi
          echo "✅ Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT

      - name: Sign and zipalign APK
        id: sign
        run: |
          APK="${{ steps.locate.outputs.apk_path }}"
          [ -z "$APK" ] && echo "❌ No APK path from locate step!" && exit 1

          APP="${{ github.event.inputs.app_name }}"
          BRANCH="${{ github.event.inputs.branch }}"
          ABI="${{ steps.abi.outputs.value }}"
          CUSTOM="${{ github.event.inputs.apk_filename }}"

          # Use custom filename if provided, otherwise auto-generate from app name
          if [ -n "$CUSTOM" ]; then
            # Strip any .apk extension the user may have included, then re-add it
            SAFE_NAME=$(echo "$CUSTOM" | sed 's/\.apk$//i' | tr ' ' '_')
          else
            SAFE_NAME=$(echo "$APP" | tr ' ' '_')
            SAFE_NAME="${SAFE_NAME}-${BRANCH}-${ABI}"
          fi

          OUT_NAME="${SAFE_NAME}.apk"
          OUT="/tmp/$OUT_NAME"
          ALIGNED="/tmp/aligned.apk"

          $ANDROID_HOME/build-tools/34.0.0/zipalign -v 4 "$APK" "$ALIGNED"
          $ANDROID_HOME/build-tools/34.0.0/apksigner sign \
            --ks ~/.android/kodi.keystore \
            --ks-key-alias kodi \
            --ks-pass pass:android \
            --key-pass pass:android \
            --out "$OUT" \
            "$ALIGNED"

          SIZE=$(du -sh "$OUT" | cut -f1)
          echo "✅ Signed APK: $OUT_NAME ($SIZE)"
          echo "apk_path=$OUT"      >> $GITHUB_OUTPUT
          echo "apk_name=$OUT_NAME" >> $GITHUB_OUTPUT

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.sign.outputs.apk_name }}
          path: ${{ steps.sign.outputs.apk_path }}
          retention-days: 30

      - name: Publish GitHub Release
        if: github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: build-${{ github.run_number }}
          name: "${{ github.event.inputs.app_name }} ${{ github.event.inputs.branch }} — Build #${{ github.run_number }}"
          body: |
            ## Custom Kodi APK

            | Setting | Value |
            |---------|-------|
            | Kodi branch | `${{ github.event.inputs.branch }}` |
            | App name | ${{ github.event.inputs.app_name }} |
            | APK filename | `${{ steps.sign.outputs.apk_name }}` |
            | Package ID | `${{ github.event.inputs.package_id }}` |
            | Target ABI | `${{ steps.abi.outputs.value }}` |
            | Unknown sources | ${{ github.event.inputs.unknown_sources == 'true' && 'Pre-enabled' || 'Default (off)' }} |
            | Built | ${{ github.run_number }} |

            ### Install
            1. Download the `.apk` file below
            2. Transfer to your Android device
            3. Enable **Unknown sources** in Android Settings → Security
            4. Open the APK file on the device to install

            > Built automatically by GitHub Actions from [xbmc/xbmc](https://github.com/xbmc/xbmc)
          files: ${{ steps.sign.outputs.apk_path }}
          draft: false
          prerelease: false

      - name: Collect diagnostic bundle
        if: always() && github.event.inputs.debug_mode == 'true'
        run: |
          set -euo pipefail
          OUT=/tmp/kodi-build-diagnostics
          rm -rf "$OUT"
          mkdir -p "$OUT"
          cp -f ~/depends-build.log "$OUT/" 2>/dev/null || true
          cp -f ~/cmakebuildsys.log "$OUT/" 2>/dev/null || true
          cp -f ~/kodi-build.log "$OUT/" 2>/dev/null || true
          cp -f ~/apk-package.log "$OUT/" 2>/dev/null || true
          {
            echo "branch=${{ github.event.inputs.branch }}"
            echo "abi=${{ github.event.inputs.abi }}"
            echo "run_id=${{ github.run_id }}"
            echo "run_number=${{ github.run_number }}"
            echo "workflow=${{ github.workflow }}"
          } > "$OUT/run-meta.txt"
          if [ -d "$HOME/kodi-build" ]; then
            ls -la "$HOME/kodi-build" > "$OUT/kodi-build-ls.txt" || true
          fi
          if [ -f "$HOME/kodi-build/CMakeCache.txt" ]; then
            cp "$HOME/kodi-build/CMakeCache.txt" "$OUT/" || true
          fi
          if [ -d "$HOME/kodi/tools/depends/target/cmakebuildsys" ]; then
            ls -la "$HOME/kodi/tools/depends/target/cmakebuildsys" > "$OUT/cmakebuildsys-ls.txt" || true
          fi
          tar -czf /tmp/kodi-build-diagnostics.tgz -C /tmp kodi-build-diagnostics

      - name: Upload diagnostics artifact
        if: always() && github.event.inputs.debug_mode == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: kodi-build-diagnostics-${{ github.run_number }}
          path: /tmp/kodi-build-diagnostics.tgz
          retention-days: 14
